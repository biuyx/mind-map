appId: com.mindmap.mcp
productName: MindMap MCP
# Output to dist_electron (gitignored) so the packaged installer never clobbers
# the committed web build under ../dist.
directories:
  output: dist_electron
  buildResources: resources
# Only the app's own source. electron-builder auto-includes production deps
# (ws, zod, @modelcontextprotocol/sdk) and excludes devDeps (electron, builder).
files:
  - main.js
  - menu.js
  - mcp-wrapper.js
  - preload-bridge.js
  - preload-early.js
  - mcp-config.js
  - register-mcp.js
  - package.json
# Keep app files unpacked so mcp-wrapper.js can be launched directly via
# ELECTRON_RUN_AS_NODE for MCP mode (see README.md).
asar: false
extraResources:
  - from: ../dist
    to: dist
    filter:
      - "**/*"
  - from: ../index.html
    to: index.html
# Post-install launcher placed next to the exe; runs `<exe> --register`.
extraFiles:
  - from: build/register.cmd
    to: register.cmd
win:
  target:
    - nsis
  icon: resources/icon.ico
  # Code signing is off by default (unsigned -> SmartScreen warning).
  # To sign, add one of the blocks documented in README.md, e.g. Azure Trusted
  # Signing (azureSignOptions: ...) or Certum (certificateSubjectName: ...).
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
